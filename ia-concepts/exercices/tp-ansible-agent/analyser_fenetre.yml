---
- name: Extraire la fenêtre de log de cette tentative
  shell: "{{ item }}"
  register: log_extrait
  delegate_to: rh8102

- name: Interroger le LLM avec sortie JSON garantie (structured outputs)
  uri:
    url: "{{ llm_api_url }}"
    method: POST
    headers:
      x-api-key: "{{ llm_api_key }}"
      anthropic-version: "2023-06-01"
      content-type: application/json
    body_format: json
    body:
      model: "{{ llm_model }}"
      max_tokens: 1024
      messages:
        - role: user
          content: >
            Voici un extrait de log système : {{ log_extrait.stdout }}

            Analyse cet extrait en 2-3 phrases maximum. Mets
            "diagnostic_suffisant" à false si l'extrait ne permet pas
            d'identifier une cause racine claire (par exemple si tu ne
            vois que des symptômes génériques sans event déclencheur
            identifiable).
      output_config:
        format:
          type: json_schema
          schema:
            type: object
            properties:
              diagnostic_suffisant:
                type: boolean
              analyse:
                type: string
            required:
              - diagnostic_suffisant
              - analyse
            additionalProperties: false
    status_code: 200
    return_content: yes
  register: llm_response

- name: Vérifier que la réponse n'a pas été tronquée par max_tokens
  fail:
    msg: >
      Réponse tronquée par max_tokens sur la tentative '{{ item }}'
      (stop_reason={{ llm_response.json.stop_reason }}) - augmenter
      max_tokens plutôt que de tenter de parser un JSON incomplet.
  when: llm_response.json.stop_reason == "max_tokens"

- name: Parser la réponse JSON (garantie valide par le schéma, pas de prefill nécessaire)
  set_fact:
    reponse_parsee: "{{ llm_response.json.content[0].text | from_json }}"

- name: Mettre à jour le statut de diagnostic
  set_fact:
    diagnostic_suffisant: "{{ reponse_parsee.diagnostic_suffisant }}"
    derniere_analyse: "{{ reponse_parsee.analyse }}"
    derniere_fenetre: "{{ item }}"

- name: Afficher le résultat de cette tentative
  debug:
    msg: "Tentative avec '{{ item }}' -> suffisant={{ diagnostic_suffisant }}"
