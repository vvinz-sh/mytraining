<div style="position: relative; width: 100%; height: 380px;">
<canvas id="radarChart" role="img" aria-label="Graphique radar comparant le niveau atteint par thématique IA à un référentiel de junior MLOps 2 ans d'expérience, sur une échelle de 0 à 10 : fondamentaux 6, génération et paramètres 7, RAG et embeddings 7, attention et architecture 6, hardware 5, sécurité 6, écosystème 3">Niveau estimé par rapport à un junior MLOps 2 ans d'expérience, sur 10 : fondamentaux 6, génération et paramètres 7, RAG et embeddings 7, attention et architecture 6, hardware 5, sécurité 6, écosystème 3.</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ctx = document.getElementById('radarChart');
const labels = ['Fondamentaux', 'Génération & paramètres', 'RAG & embeddings', 'Attention & architecture', 'Hardware', 'Sécurité', 'Écosystème'];
const values = [6, 7, 7, 6, 5, 6, 3];
new Chart(ctx, {
  type: 'radar',
  data: {
    labels: labels,
    datasets: [{
      label: 'Niveau estimé',
      data: values,
      backgroundColor: 'rgba(42,120,214,0.15)',
      borderColor: '#2a78d6',
      pointBackgroundColor: '#2a78d6',
      borderWidth: 2,
      pointRadius: 4
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      r: {
        min: 0,
        max: 10,
        ticks: { stepSize: 2, color: '#898781', backdropColor: 'transparent' },
        grid: { color: '#e1e0d9' },
        angleLines: { color: '#e1e0d9' },
        pointLabels: { color: '#52514e', font: { size: 12 } }
      }
    },
    plugins: { legend: { display: false } }
  }
});
</script>
